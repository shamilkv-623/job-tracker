name: Global 24h Job Scan

on:
  schedule:
    - cron: '0 0 * * *'  # Runs every day at midnight UTC
  workflow_dispatch:      # Allows you to click "Run" manually to test

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip' # This speeds up future runs by caching libraries

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # We force install supabase here just in case it's missing from requirements.txt
          pip install supabase pandas 
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Global Scan
        run: python cron_scan.py
